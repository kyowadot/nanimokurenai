<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ドット絵エディタ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: none; }
    body {
      font-family: sans-serif;
      background: #111;
      color: #fff;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 8px;
      background: #1b1b1b;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    .tool-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 8px;
      background: #2a2a2a;
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .tool-btn:active { background: #3a3a3a; transform: scale(0.95); }
    .tool-btn.active { background: #4a4a4a; border: 2px solid #666; }
    .main-area {
      flex: 1;
      position: relative;
      overflow: auto;
      background: #1d1d1d;
      touch-action: pan-x pan-y;
    }
    .sprite-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(33vw, 1fr));
      gap: 8px;
      padding: 8px;
    }
    @media (min-width: 768px) {
      .sprite-grid {
        grid-template-columns: repeat(auto-fit, minmax(25vw, 1fr));
      }
    }
    @media (min-width: 1200px) {
      .sprite-grid {
        grid-template-columns: repeat(auto-fit, minmax(20vw, 1fr));
      }
    }
    .sprite-cell {
      aspect-ratio: 1;
      background: #222;
      border: 2px solid #333;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }
    .sprite-cell.selected { border-color: #666; }
    .sprite-cell .bg {
      width: 100%;
      height: 100%;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
    .fixed-window {
      position: fixed;
      bottom: 2px;
      right: 2px;
      background: #2a2a2a;
      border: 2px solid #444;
      border-radius: 12px;
      display: none;
      flex-direction: column;
      z-index: 100;
      min-width: 96px;
      min-height: 64px;
      touch-action: none;
    }
    .fixed-window.show { display: flex; }
    .fixed-window.edit-mode {
      bottom: 0;
      left: 0;
      right: 0;
      border-radius: 0;
      border: none;
      border-top: 2px solid #444;
      min-width: 100%;
      height: 100%;
    }
    .fixed-header {
      padding: 8px 12px;
      background: #3a3a3a;
      border-bottom: 1px solid #444;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: ns-resize;
    }
    .fixed-close {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 4px;
      background: #d32f2f;
      color: #fff;
      cursor: pointer;
    }
    .fixed-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .canvas-grid {
      position: absolute;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    .chip {
      position: absolute;
      cursor: move;
      background-size: cover;
      background-repeat: no-repeat;
      touch-action: none;
    }
    .chip.dragging { opacity: 0.6; z-index: 1000; }
    .zoom-controls {
      position: fixed;
      bottom: 80px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 99;
    }
    .zoom-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: #2a2a2a;
      color: #fff;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="tool-btn" id="addBtn">＋</button>
    <button class="tool-btn" id="delBtn">－</button>
    <button class="tool-btn" id="undoBtn">↩</button>
    <button class="tool-btn" id="redoBtn">↪</button>
    <button class="tool-btn" id="modeBtn">♺</button>
    <button class="tool-btn" id="backBtn">□</button>
  </div>
  <div class="main-area">
    <div class="sprite-grid" id="spriteGrid"></div>
  </div>
  <div class="fixed-window" id="fixedWin">
    <div class="fixed-header" id="fixedHeader">
      <span>ｆｄ</span>
      <button class="fixed-close" id="fixedClose">×</button>
    </div>
    <div class="fixed-content">
      <div class="canvas-grid" id="canvasGrid"></div>
    </div>
  </div>
  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomIn">＋</button>
    <button class="zoom-btn" id="zoomOut">－</button>
  </div>

  <script>
    // 状態
    const state = {
      sprites: [],      // {id, src, name, width, height, chipW, chipH}
      selectedId: null,
      chips: [],        // {id, spriteId, src, x, y, chipW, chipH, cropX, cropY}
      isEdit: false,
      winH: 300,
      zoom: 1,
      history: [],
      histIdx: -1
    };

    // DOM
    const els = {
      grid: document.getElementById('spriteGrid'),
      fixed: document.getElementById('fixedWin'),
      header: document.getElementById('fixedHeader'),
      canvas: document.getElementById('canvasGrid'),
      close: document.getElementById('fixedClose')
    };

    // パーサー
    function parseSize(name) {
      const m = name.match(/_(\d+)x(\d+)\.png$/i);
      return m ? { w: +m[1], h: +m[2] } : { w: 32, h: 32 };
    }

    // 履歴
    function saveHist() {
      const copy = JSON.parse(JSON.stringify({
        sprites: state.sprites,
        selectedId: state.selectedId,
        chips: state.chips,
        winH: state.winH,
        zoom: state.zoom
      }));
      state.history = state.history.slice(0, state.histIdx + 1);
      state.history.push(copy);
      state.histIdx++;
      localSave();
    }

    function undo() {
      if (state.histIdx > 0) {
        state.histIdx--;
        restore(state.history[state.histIdx]);
      }
    }

    function redo() {
      if (state.histIdx < state.history.length - 1) {
        state.histIdx++;
        restore(state.history[state.histIdx]);
      }
    }

    function restore(s) {
      state.sprites = JSON.parse(JSON.stringify(s.sprites));
      state.selectedId = s.selectedId;
      state.chips = JSON.parse(JSON.stringify(s.chips));
      state.winH = s.winH;
      state.zoom = s.zoom;
      render();
    }

    // localStorage
    function localSave() {
      localStorage.setItem('memo_v2', JSON.stringify({
        sprites: state.sprites,
        selectedId: state.selectedId,
        chips: state.chips,
        isEdit: state.isEdit,
        winH: state.winH,
        zoom: state.zoom
      }));
    }

    function localLoad() {
      const s = localStorage.getItem('memo_v2');
      if (s) {
        const d = JSON.parse(s);
        state.sprites = d.sprites || [];
        state.selectedId = d.selectedId || null;
        state.chips = d.chips || [];
        state.isEdit = d.isEdit || false;
        state.winH = d.winH || 300;
        state.zoom = d.zoom || 1;
        state.history = [JSON.parse(JSON.stringify({
          sprites: state.sprites,
          selectedId: state.selectedId,
          chips: state.chips,
          winH: state.winH,
          zoom: state.zoom
        }))];
        state.histIdx = 0;
      } else {
        saveHist();
      }
    }

    // 画像追加
    document.getElementById('addBtn').onclick = () => {
      const inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = 'image/png';
      inp.onchange = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const sz = parseSize(f.name);
            state.sprites.push({
              id: Date.now().toString(),
              src: ev.target.result,
              name: f.name,
              width: img.width,
              height: img.height,
              chipW: sz.w,
              chipH: sz.h
            });
            saveHist();
            render();
          };
          img.src = ev.target.result;
        };
        r.readAsDataURL(f);
      };
      inp.click();
    };

    // 削除
    document.getElementById('delBtn').onclick = () => {
      if (!state.selectedId) return;
      const id = state.selectedId;
      state.sprites = state.sprites.filter(s => s.id !== id);
      state.chips = state.chips.filter(c => c.spriteId !== id);
      state.selectedId = null;
      saveHist();
      render();
    };

    // undo/redo
    document.getElementById('undoBtn').onclick = undo;
    document.getElementById('redoBtn').onclick = redo;

    // モード切替
    document.getElementById('modeBtn').onclick = () => {
      state.isEdit = !state.isEdit;
      document.getElementById('modeBtn').classList.toggle('active', state.isEdit);
      render();
    };

    // 戻る
    document.getElementById('backBtn').onclick = () => {
      location.href = 'index.html';
    };

    // 固定窓閉じる
    els.close.onclick = () => {
      state.chips = [];
      saveHist();
      render();
    };

    // ズーム
    document.getElementById('zoomIn').onclick = () => {
      state.zoom *= 1.2;
      saveHist();
      render();
    };
    document.getElementById('zoomOut').onclick = () => {
      state.zoom /= 1.2;
      saveHist();
      render();
    };

    // ピンチズーム：main-areaのみ
    let pinchStart = 0;
    let isPinching = false;
    const mainArea = document.querySelector('.main-area');
    
    mainArea.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        isPinching = true;
        pinchStart = Math.hypot(
          e.touches[0].pageX - e.touches[1].pageX,
          e.touches[0].pageY - e.touches[1].pageY
        );
      }
    }, { passive: true });
    
    mainArea.addEventListener('touchmove', (e) => {
      if (isPinching && e.touches.length === 2) {
        e.preventDefault();
        const d = Math.hypot(
          e.touches[0].pageX - e.touches[1].pageX,
          e.touches[0].pageY - e.touches[1].pageY
        );
        state.zoom *= d / pinchStart;
        pinchStart = d;
        render();
      }
    }, { passive: false });
    
    mainArea.addEventListener('touchend', () => {
      isPinching = false;
    }, { passive: true });
    
    // 標準ピンチズームを無効化
    document.addEventListener('touchmove', (e) => {
      if (e.scale !== 1) {
        e.preventDefault();
      }
    }, { passive: false });

    // レンダリング
    function render() {
      // スプライト一覧
      els.grid.innerHTML = '';
      state.sprites.forEach(sp => {
        const cell = document.createElement('div');
        cell.className = 'sprite-cell' + (sp.id === state.selectedId ? ' selected' : '');
        const bg = document.createElement('div');
        bg.className = 'bg';
        bg.style.backgroundImage = `url(${sp.src})`;
        cell.appendChild(bg);
        // 高速タップ対応：touchstartで即座に処理
        let touchStartTime = 0;
        let touchStartX = 0;
        let touchStartY = 0;
        
        cell.addEventListener('touchstart', (e) => {
          touchStartTime = Date.now();
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
        }, { passive: true });
        
        cell.addEventListener('touchend', (e) => {
          const touchEndTime = Date.now();
          const touchEndX = e.changedTouches[0].clientX;
          const touchEndY = e.changedTouches[0].clientY;
          const deltaTime = touchEndTime - touchStartTime;
          const deltaX = Math.abs(touchEndX - touchStartX);
          const deltaY = Math.abs(touchEndY - touchStartY);
          
          // タップ判定（300ms以内、10px以内の移動）
          if (deltaTime < 300 && deltaX < 10 && deltaY < 10) {
            e.preventDefault();
            onSpriteClick(e.changedTouches[0], sp, cell);
          }
        }, { passive: false });
        
        cell.addEventListener('click', (e) => {
          // PC用
          onSpriteClick(e, sp, cell);
        });
        
        els.grid.appendChild(cell);
      });

      // 固定窓
      if (state.chips.length === 0) {
        els.fixed.classList.remove('show');
      } else {
        els.fixed.classList.add('show');
        els.fixed.style.height = state.isEdit ? '50%' : `${Math.max(state.winH, 200)}px`;
        els.fixed.classList.toggle('edit-mode', state.isEdit);
      }

      // チップ描画
      els.canvas.innerHTML = '';
      const sc = state.isEdit ? 2 : 2;
      state.chips.forEach((chip, i) => {
        const el = document.createElement('div');
        el.className = 'chip';
        el.style.left = `${chip.x}px`;
        el.style.top = `${chip.y}px`;
        el.style.width = `${chip.chipW * sc * state.zoom}px`;
        el.style.height = `${chip.chipH * sc * state.zoom}px`;
        el.style.backgroundImage = `url(${chip.src})`;
        el.style.backgroundPosition = `-${chip.cropX * sc * state.zoom}px -${chip.cropY * sc * state.zoom}px`;
        el.style.backgroundSize = `${chip.width * sc * state.zoom}px ${chip.height * sc * state.zoom}px`;
        if (state.isEdit) setupDrag(el, chip, i);
        els.canvas.appendChild(el);
      });
    }

    // スプライトクリック
    function onSpriteClick(e, sp, cell) {
      const wasSelected = state.selectedId === sp.id;
      state.selectedId = sp.id;

      if (wasSelected) {
        // クリック位置からcrop計算
        const rect = cell.getBoundingClientRect();
        const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
        const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
        const col = Math.floor((x / rect.width) * (sp.width / sp.chipW));
        const row = Math.floor((y / rect.height) * (sp.height / sp.chipH));
        const cropX = Math.min(col * sp.chipW, sp.width - sp.chipW);
        const cropY = Math.min(row * sp.chipH, sp.height - sp.chipH);

        // チップ追加
        state.chips.push({
          id: Date.now().toString(),
          spriteId: sp.id,
          src: sp.src,
          x: 0,
          y: 0,
          width: sp.width,
          height: sp.height,
          chipW: sp.chipW,
          chipH: sp.chipH,
          cropX: cropX,
          cropY: cropY
        });
        saveHist();
      }
      render();
    }

    // ドラッグ：高速タッチ対応
    function setupDrag(el, chip, idx) {
      let dragging = false;
      let sx, sy, ox, oy;
      let touchStartTime = 0;

      const start = (e) => {
        dragging = true;
        touchStartTime = Date.now();
        el.classList.add('dragging');
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        sx = cx;
        sy = cy;
        ox = chip.x;
        oy = chip.y;
      };

      const move = (e) => {
        if (!dragging) return;
        e.preventDefault();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        chip.x = ox + (cx - sx);
        chip.y = oy + (cy - sy);
        el.style.left = `${chip.x}px`;
        el.style.top = `${chip.y}px`;
      };

      const end = (e) => {
        if (!dragging) return;
        dragging = false;
        el.classList.remove('dragging');
        
        // タップかドラッグか判定
        const deltaTime = Date.now() - touchStartTime;
        
        const rc = els.canvas.getBoundingClientRect();
        const re = el.getBoundingClientRect();
        
        // 外に出ていたら削除
        if (re.right < rc.left || re.left > rc.right || re.bottom < rc.top || re.top > rc.bottom) {
          state.chips.splice(idx, 1);
          saveHist();
          render();
        } else if (deltaTime < 200) {
          // 短いタップは無視（クリックとして扱う）
          saveHist();
        } else {
          saveHist();
        }
      };

      el.addEventListener('mousedown', start);
      el.addEventListener('touchstart', start, { passive: false });
      document.addEventListener('mousemove', move, { passive: false });
      document.addEventListener('touchmove', move, { passive: false });
      document.addEventListener('mouseup', end);
      document.addEventListener('touchend', end, { passive: false });
    }

    // リサイズ
    let resizing = false;
    els.header.addEventListener('mousedown', (e) => {
      if (state.isEdit) {
        resizing = true;
      }
    });
    els.header.addEventListener('touchstart', (e) => {
      if (state.isEdit) {
        resizing = true;
      }
    }, { passive: true });
    document.addEventListener('mousemove', (e) => {
      if (!resizing || !state.isEdit) return;
      state.winH = Math.max(100, window.innerHeight - e.clientY);
      els.fixed.style.height = `${state.winH}px`;
    });
    document.addEventListener('touchmove', (e) => {
      if (!resizing || !state.isEdit) return;
      state.winH = Math.max(100, window.innerHeight - e.touches[0].clientY);
      els.fixed.style.height = `${state.winH}px`;
    }, { passive: true });
    document.addEventListener('mouseup', () => {
      if (resizing) {
        resizing = false;
        saveHist();
      }
    });
    document.addEventListener('touchend', () => {
      if (resizing) {
        resizing = false;
        saveHist();
      }
    });

    // 初期化
    localLoad();
    render();
  </script>
</body>
</html>
