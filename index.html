<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Memo Pad</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    body {
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 10px 6px;
      background: #1b1b1b;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tool-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: #2a2a2a;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    .tool-btn:active {
      transform: scale(0.96);
    }

    .editor-wrap {
      flex: 1;
      padding: 12px;
    }

    textarea {
      width: 100%;
      height: 100%;
      resize: none;
      border: none;
      outline: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.6;
      background: #1d1d1d;
      color: white;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <button class="tool-btn" id="voiceBtn" title="音声入力">🎤</button>
    <button class="tool-btn" id="saveBtn" title="saveaslove">💾</button>
    <button class="tool-btn" id="selectAllBtn" title="全て選択">🔲</button>
    <button class="tool-btn" id="pasteBtn" title="貼り付け">📋</button>
    <button class="tool-btn" id="copyBtn" title="コピー">📄</button>
    <button class="tool-btn" id="deleteBtn" title="削除">🗑️</button>
    <button class="tool-btn" id="undoBtn" title="元に戻す">↩️</button>
    <button class="tool-btn" id="redoBtn" title="やり直し">↪️</button>
    <button class="tool-btn" id="fontBtn" title="文字サイズ">🔠</button>
    <button class="tool-btn" id="settingBtn" title="設定">⚙️</button>
  </div>

  <div class="editor-wrap">
    <textarea id="memo" placeholder="ここにメモを書く..."></textarea>
  </div>

  <script>
    const memo = document.getElementById('memo');
    let fontSize = 18;
    let history = [''];
    let historyIndex = 0;

    // 自動保存
    memo.value = localStorage.getItem('memo_text') || '';
    memo.addEventListener('input', () => {
      localStorage.setItem('memo_text', memo.value);

      if (history[historyIndex] !== memo.value) {
        history = history.slice(0, historyIndex + 1);
        history.push(memo.value);
        historyIndex++;
      }
    });

    // select all
    document.getElementById('selectAllBtn').addEventListener('click', () => {
      memo.focus();
      memo.select();
    });

    // copy
    document.getElementById('copyBtn').addEventListener('click', async () => {
      await navigator.clipboard.writeText(memo.value);
      alert('コピーしました');
    });

    // paste
    document.getElementById('pasteBtn').addEventListener('click', async () => {
      const text = await navigator.clipboard.readText();
      memo.value += text;
      localStorage.setItem('memo_text', memo.value);
    });

    // undo
    document.getElementById('undoBtn').addEventListener('click', () => {
      if (historyIndex > 0) {
        historyIndex--;
        memo.value = history[historyIndex];
        localStorage.setItem('memo_text', memo.value);
      }
    });

    // redo
    document.getElementById('redoBtn').addEventListener('click', () => {
      if (historyIndex < history.length - 1) {
        historyIndex++;
        memo.value = history[historyIndex];
        localStorage.setItem('memo_text', memo.value);
      }
    });

    // delete
    document.getElementById('deleteBtn').addEventListener('click', () => {
      if (confirm('メモを削除しますか？')) {
        memo.value = '';
        localStorage.removeItem('memo_text');
      }
    });

    // font size
    document.getElementById('fontBtn').addEventListener('click', () => {
      fontSize += 2;
      if (fontSize > 30) fontSize = 14;
      memo.style.fontSize = fontSize + 'px';
    });

    // save as .love (実体はtxt保存)
    document.getElementById('saveBtn').addEventListener('click', () => {
      const blob = new Blob([memo.value], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'result.love';
      a.click();
    });

    // 設定
    document.getElementById('settingBtn').addEventListener('click', () => {
      alert('設定画面（今後追加）');
    });

    // 音声入力（Chrome Android対応）
    document.getElementById('voiceBtn').addEventListener('click', () => {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        alert('この端末では音声入力に対応していません');
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.start();

      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        memo.value += text;
        localStorage.setItem('memo_text', memo.value);
      };
    });
  </script>

</body>
</html>
