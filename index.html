<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Android Memo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    body {
      background: #111;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1b1b1b;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-around;
      gap: 8px;
      padding: 10px 6px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .tool-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: #2a2a2a;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tool-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      pointer-events: none;
    }

    .editor-wrap {
      flex: 1;
      min-height: 0;
      padding: 12px;
    }

    textarea {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      border-radius: 16px;
      background: #1d1d1d;
      color: white;
      padding: 16px;
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="toolbar">
  <button class="tool-btn" id="voiceBtn" title="音声入力">🎤</button>
  <button class="tool-btn" id="saveBtn" title="保存">💾</button>
  <button class="tool-btn" id="selectAllBtn" title="全選択">🔲</button>
  <button class="tool-btn" id="pasteBtn" title="貼り付け">📋</button>
  <button class="tool-btn" id="copyBtn" title="コピー">📄</button>
  <button class="tool-btn" id="deleteBtn" title="削除">🗑️</button>
  <button class="tool-btn" id="undoBtn" title="Undo">↩️</button>
  <button class="tool-btn" id="redoBtn" title="Redo">↪️</button>
  <button class="tool-btn" id="fontBtn" title="文字サイズ">🔠</button>
  <button class="tool-btn" id="settingBtn" title="設定">⚙️</button>
</div>

<div class="editor-wrap">
  <textarea id="memo" placeholder="ここにメモを書く..."></textarea>
</div>

<script>
const memo = document.getElementById('memo');
let fontSize = 18;
let history = [];
let historyIndex = -1;

function pushHistory(value) {
  if (history[historyIndex] === value) return;
  history = history.slice(0, historyIndex + 1);
  history.push(value);
  historyIndex = history.length - 1;
}

memo.value = localStorage.getItem('memo_text') || '';
pushHistory(memo.value);

memo.addEventListener('input', () => {
  localStorage.setItem('memo_text', memo.value);
  pushHistory(memo.value);
});

document.getElementById('copyBtn').addEventListener('click', async () => {
  await navigator.clipboard.writeText(memo.value);
});

document.getElementById('pasteBtn').addEventListener('click', async () => {
  const text = await navigator.clipboard.readText();
  memo.value += text;
  localStorage.setItem('memo_text', memo.value);
  pushHistory(memo.value);
});

document.getElementById('deleteBtn').addEventListener('click', () => {
  memo.value = '';
  localStorage.removeItem('memo_text');
  pushHistory(memo.value);
});

document.getElementById('undoBtn').addEventListener('click', () => {
  if (historyIndex > 0) {
    historyIndex--;
    memo.value = history[historyIndex];
    localStorage.setItem('memo_text', memo.value);
  }
});

document.getElementById('redoBtn').addEventListener('click', () => {
  if (historyIndex < history.length - 1) {
    historyIndex++;
    memo.value = history[historyIndex];
    localStorage.setItem('memo_text', memo.value);
  }
});

document.getElementById('selectAllBtn').addEventListener('click', () => {
  memo.focus();
  memo.select();
});

document.getElementById('fontBtn').addEventListener('click', () => {
  fontSize += 2;
  if (fontSize > 30) fontSize = 14;
  memo.style.fontSize = fontSize + 'px';
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  let fileName = localStorage.getItem('memo_file_name');

  if (!fileName) {
    fileName = prompt('ファイル名を入力', 'result');
    if (!fileName) return;
    if (!fileName.endsWith('.love')) fileName += '.love';
    localStorage.setItem('memo_file_name', fileName);
  }

  const zip = new JSZip();
  zip.file('main.lua', memo.value || '-- empty main.lua');

  const content = await zip.generateAsync({ type: 'blob' });

  const a = document.createElement('a');
  a.href = URL.createObjectURL(content);
  a.download = fileName;
  a.click();
});

document.getElementById('voiceBtn').addEventListener('click', () => {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;

  const recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.start();

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    memo.value += text;
    localStorage.setItem('memo_text', memo.value);
    pushHistory(memo.value);
  };
});
</script>

</body>
</html>
